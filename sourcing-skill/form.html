<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Sourcing — New Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 680px;
      padding: 2.5rem 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 0.375rem;
    }

    label .optional {
      font-weight: 400;
      color: #94a3b8;
      font-size: 0.8rem;
      margin-left: 0.25rem;
    }

    input[type="text"],
    input[type="url"],
    select,
    textarea {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 7px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1e293b;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    select:focus,
    textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    textarea {
      resize: vertical;
    }

    select {
      cursor: pointer;
    }

    /* Radio group */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #cbd5e1;
      border-radius: 7px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .radio-option:has(input:checked) {
      border-color: #6366f1;
      background: #eef2ff;
    }

    .radio-option input[type="radio"] {
      accent-color: #6366f1;
      width: 1rem;
      height: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .radio-label {
      font-size: 0.9rem;
      color: #334155;
    }

    .radio-label strong {
      color: #1e293b;
    }

    /* Hidden field */
    .field-hidden {
      display: none;
    }

    /* Two-column row */
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 1.5rem 1rem; }
    }

    /* Submit */
    .actions {
      margin-top: 1.75rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #6366f1;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #4f46e5;
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Messages */
    .message {
      display: none;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: 1.25rem;
    }

    .message-success {
      background: #f0fdf4;
      border: 1.5px solid #86efac;
      color: #166534;
    }

    .message-error {
      background: #fff1f2;
      border: 1.5px solid #fca5a5;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>New Sourcing Search</h1>
    <p class="subtitle">Fill in the mandate details to kick off the sourcing automation.</p>

    <form id="sourcing-form">

      <div class="row">
        <div class="field">
          <label for="job_title">Job Title</label>
          <input type="text" id="job_title" name="job_title" required placeholder="e.g. Senior Backend Engineer" />
        </div>
        <div class="field">
          <label for="company_name">Company Name</label>
          <input type="text" id="company_name" name="company_name" required placeholder="e.g. Acme GmbH" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="company_website">Company Website</label>
          <input type="url" id="company_website" name="company_website" required placeholder="https://acme.com" />
        </div>
        <div class="field">
          <label for="job_location">Job Location</label>
          <input type="text" id="job_location" name="job_location" required placeholder="e.g. Berlin, Germany" />
        </div>
      </div>

      <div class="field">
        <label for="work_model">Work Model</label>
        <select id="work_model" name="work_model" required>
          <option value="" disabled selected>Select…</option>
          <option value="Hybrid">Hybrid</option>
          <option value="Remote">Remote</option>
          <option value="On-site">On-site</option>
        </select>
      </div>

      <div class="field">
        <label for="job_description">Job Description</label>
        <textarea id="job_description" name="job_description" rows="9" required
          placeholder="Paste the full job description here…"></textarea>
      </div>

      <div class="field">
        <label>Search Tier</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="search_tier" value="1" id="tier1" required />
            <span class="radio-label"><strong>Narrow</strong> — donor companies + titles</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="search_tier" value="2" id="tier2" required />
            <span class="radio-label"><strong>Medium</strong> — titles + skills</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="search_tier" value="3" id="tier3" required />
            <span class="radio-label"><strong>Broad</strong> — keywords only</span>
          </label>
        </div>
      </div>

      <div class="field field-hidden" id="manual-companies-field">
        <label for="manual_companies">
          Manual Companies <span class="optional">(optional)</span>
        </label>
        <textarea id="manual_companies" name="manual_companies" rows="3"
          placeholder="One company per line, e.g.&#10;Google&#10;Meta&#10;Stripe"></textarea>
      </div>

      <div class="field">
        <label for="max_results">Max Results</label>
        <select id="max_results" name="max_results" required>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="75">75</option>
          <option value="100">100</option>
        </select>
      </div>

      <div class="actions">
        <button type="submit" id="submit-btn">Start Sourcing →</button>
      </div>

      <div class="message message-success" id="msg-success">
        ✓ Form submitted — keep this window open. Results will appear here when the search is complete.
      </div>
      <div class="message message-error" id="msg-error"></div>

    </form>
  </div>

  <script>
    (function () {
      var form = document.getElementById('sourcing-form');
      var manualField = document.getElementById('manual-companies-field');
      var submitBtn = document.getElementById('submit-btn');
      var msgSuccess = document.getElementById('msg-success');
      var msgError = document.getElementById('msg-error');

      // Show/hide Manual Companies based on tier selection
      document.querySelectorAll('input[name="search_tier"]').forEach(function (radio) {
        radio.addEventListener('change', function () {
          if (this.value === '1') {
            manualField.style.display = 'block';
            manualField.classList.remove('field-hidden');
          } else {
            manualField.style.display = 'none';
            document.getElementById('manual_companies').value = '';
          }
        });
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        msgSuccess.style.display = 'none';
        msgError.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting…';

        var tierRadio = document.querySelector('input[name="search_tier"]:checked');

        var payload = {
          job_title: document.getElementById('job_title').value.trim(),
          company_name: document.getElementById('company_name').value.trim(),
          company_website: document.getElementById('company_website').value.trim(),
          job_location: document.getElementById('job_location').value.trim(),
          work_model: document.getElementById('work_model').value,
          job_description: document.getElementById('job_description').value.trim(),
          search_tier: tierRadio ? tierRadio.value : '',
          manual_companies: document.getElementById('manual_companies').value.trim(),
          max_results: document.getElementById('max_results').value
        };

        fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { ok: res.ok, data: data };
            });
          })
          .then(function (result) {
            if (result.ok) {
              form.style.display = 'none';
              document.querySelector('h1').textContent = 'Sourcing Running…';
              document.querySelector('.subtitle').textContent = 'Check the Claude Code terminal for live progress. The results page will open automatically when the search is complete.';
              msgSuccess.style.display = 'block';
            } else {
              throw new Error(result.data.error || 'Server returned an error.');
            }
          })
          .catch(function (err) {
            msgError.textContent = '✗ Error: ' + err.message;
            msgError.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Start Sourcing →';
          });
      });
    })();
  </script>
</body>
</html>
